<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>热浪推荐</title>

  <!-- DNS 预解析 + 预连接 → 消除网络延迟 -->
  <link rel="dns-prefetch" href="cdn.bootcdn.net">
  <link rel="preconnect" href="https://cdn.bootcdn.net" crossorigin>

  <!-- 关键 CSS 内联 + 异步非阻塞加载 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/docsify/4.12.2/themes/vue.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/docsify/4.12.2/themes/vue.min.css"></noscript>

  <style>
    /* 首屏零延迟：立即渲染无闪烁 */
    html, body { margin:0; padding:0; }
    #app { visibility: visible; opacity: 1 !important; }
    
    /* 字体无延迟加载策略 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // 极简配置：无冗余、无延迟、无阻塞
    window.$docsify = {
      name: '热浪推荐',
      homepage: 'index.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: false,
      maxLevel: 4,
      subMaxLevel: 4,
      mergeNavbar: true,
      ext: '.md',

      // 搜索：最小化配置
      search: {
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '暂无结果'
      },

      // 极速模式：禁用所有非核心渲染
      auto2top: true,
      smoothScroll: false,
      noEmoji: true
    };
  </script>

  <!-- 核心 JS：异步延迟加载 → 不阻塞页面渲染 -->
  <script async src="https://cdn.bootcdn.net/ajax/libs/docsify/4.12.2/docsify.min.js"></script>
  <script async src="https://cdn.bootcdn.net/ajax/libs/docsify/4.12.2/plugins/search.min.js"></script>

</body>
</html>
